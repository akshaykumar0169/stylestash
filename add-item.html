<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Piece - StyleStash</title>
    <style>
        :root {
            --primary-accent: #6366f1;
            --primary-hover: #4f46e5;
            --bg-overlay: rgba(0, 0, 0, 0.5);
            --bg-modal: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
            --drag-bg: #f9fafb;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- Modal Container --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-card {
            background: var(--bg-modal);
            width: 100%;
            max-width: 900px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            overflow: hidden;
            max-height: 90vh;
            position: relative;
        }

        /* --- Left Column: Visual Studio --- */
        .left-col {
            width: 40%;
            background: var(--drag-bg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        .upload-area {
            width: 100%;
            height: 100%;
            min-height: 300px;
            border: 2px dashed #9ca3af;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: white;
        }

        .upload-area:hover,
        .upload-area.drag-over {
            border-color: var(--primary-accent);
            background: #eef2ff;
        }

        .upload-icon {
            font-size: 48px;
            color: #9ca3af;
            margin-bottom: 12px;
        }

        .upload-text {
            color: var(--text-sub);
            text-align: center;
            font-size: 14px;
        }

        .browse-btn {
            color: var(--primary-accent);
            font-weight: 600;
            text-decoration: underline;
        }

        /* Preview State */
        .image-preview-container {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        .image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-img-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            color: var(--danger);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* AI Loader */
        .ai-loader {
            display: none;
            position: absolute;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .pulse-circle {
            width: 40px;
            height: 40px;
            background: var(--primary-accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-bottom: 10px;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(99, 102, 241, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
            }
        }

        /* --- Right Column: Details Form --- */
        .right-col {
            width: 60%;
            padding: 24px 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-sub);
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: var(--primary-accent);
        }

        /* Category Pills */
        .pills-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pill-radio {
            display: none;
        }

        .pill-label {
            padding: 8px 16px;
            background: #f3f4f6;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            color: var(--text-sub);
        }

        .pill-radio:checked+.pill-label {
            background: var(--primary-accent);
            color: white;
            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.3);
        }

        /* Honeycomb Hex Grid */
        .honeycomb {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
        }

        .honeycomb-row {
            display: flex;
            justify-content: center;
            gap: 2px;
            margin-top: -6px;
            /* Pulls rows up to interlock hexagons */
        }

        .honeycomb-row:first-child {
            margin-top: 0;
        }

        .honeycomb-cell {
            position: relative;
            width: 24px;
            height: 28px;
            cursor: pointer;
        }

        .honeycomb-cell input {
            display: none;
        }

        .honeycomb-hex {
            width: 100%;
            height: 100%;
            background-color: #ccc;
            /* Creates the hexagon shape */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            transition: transform 0.2s;
        }

        .honeycomb-cell input:checked+.honeycomb-hex {
            transform: scale(1.3);
            z-index: 10;
            position: relative;
        }

        .honeycomb-cell:hover .honeycomb-hex {
            transform: scale(1.15);
            z-index: 5;
            position: relative;
        }

        /* Warmth Slider */
        .range-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-label {
            font-size: 12px;
            color: var(--text-sub);
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--primary-accent);
            height: 6px;
            background: #e5e7eb;
            border-radius: 5px;
            outline: none;
        }

        /* Footer Actions */
        .modal-footer {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-sub);
        }

        .btn-ghost:hover {
            background: #f3f4f6;
        }

        .btn-primary {
            background: var(--primary-accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            .modal-card {
                flex-direction: column;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }

            .left-col {
                width: 100%;
                height: 250px;
                padding: 16px;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                flex-shrink: 0;
            }

            .right-col {
                width: 100%;
                flex-grow: 1;
                padding: 20px;
            }

            .upload-area {
                min-height: auto;
            }
        }
    </style>
</head>

<body>

    <div class="modal-overlay">
        <div class="modal-card">
            <div class="left-col">
                <input type="file" id="fileInput" hidden accept="image/*">

                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📷</div>
                    <p class="upload-text">Drag photo here or <span class="browse-btn">Browse</span></p>
                </div>

                <div class="ai-loader" id="aiLoader">
                    <div class="pulse-circle"></div>
                    <p style="font-size: 14px; color: var(--text-main);">Analyzing image...</p>
                </div>

                <div class="image-preview-container" id="previewContainer">
                    <button class="remove-img-btn" id="removeImgBtn" title="Remove Image">✕</button>
                    <img src="" alt="Preview" class="image-preview" id="imagePreview">
                </div>
            </div>

            <div class="right-col">
                <div class="modal-header">
                    <h2 class="modal-title">Add New Piece</h2>
                    <button class="close-modal-btn">✕</button>
                </div>

                <form id="detailsForm">
                    <div class="form-group">
                        <label for="itemName">Name</label>
                        <input type="text" id="itemName" placeholder="e.g. Vintage Levis">
                    </div>

                    <div class="form-group">
                        <label>Category <span style="color:red">*</span></label>
                        <div class="pills-container">
                            <label>
                                <input type="radio" name="category" value="top" class="pill-radio" checked>
                                <span class="pill-label">Top</span>
                            </label>
                            <label>
                                <input type="radio" name="category" value="bottom" class="pill-radio">
                                <span class="pill-label">Bottom</span>
                            </label>
                            <label>
                                <input type="radio" name="category" value="shoes" class="pill-radio">
                                <span class="pill-label">Shoes</span>
                            </label>
                            <label>
                                <input type="radio" name="category" value="outerwear" class="pill-radio">
                                <span class="pill-label">Outerwear</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="subCategory">Sub-Category</label>
                        <select id="subCategory">
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Season (Select all that apply)</label>
                        <div class="pills-container">
                            <label><input type="checkbox" class="pill-radio"><span
                                    class="pill-label">Summer</span></label>
                            <label><input type="checkbox" class="pill-radio"><span
                                    class="pill-label">Winter</span></label>
                            <label><input type="checkbox" class="pill-radio"><span
                                    class="pill-label">Rain</span></label>
                            <label><input type="checkbox" class="pill-radio"><span class="pill-label">All
                                    Year</span></label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Dominant Color</label>
                        <div class="honeycomb" id="honeycombGrid">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Warmth Level: <span id="warmthValue">5</span>/10</label>
                        <div class="range-container">
                            <span class="range-label">Cool (1)</span>
                            <input type="range" min="1" max="10" value="5" id="warmthRange">
                            <span class="range-label">Warm (10)</span>
                        </div>
                    </div>
                </form>

                <div class="modal-footer">
                    <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
                    <button class="btn btn-primary" id="saveItemBtn">Save Item</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const removeImgBtn = document.getElementById('removeImgBtn');
        const aiLoader = document.getElementById('aiLoader');
        const warmthRange = document.getElementById('warmthRange');
        const warmthValue = document.getElementById('warmthValue');

        // Track the file globally so Drag & Drop works perfectly
        let selectedFile = null;

        // --- 1. Basic UI Navigation ---
        document.querySelector('.close-modal-btn').addEventListener('click', () => {
            window.location.href = "dashboard.html";
        });

        document.getElementById('cancelBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html";
        });

        warmthRange.addEventListener('input', (e) => {
            warmthValue.textContent = e.target.value;
        });

        // --- 2. Image Upload & Preview Logic ---
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

        // Handle Drag & Drop
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            selectedFile = e.dataTransfer.files[0]; // Capture dropped file
            handleFile(selectedFile);
        });

        // Handle Clicking "Browse"
        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0]; // Capture clicked file
            handleFile(selectedFile);
        });

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                dropZone.style.display = 'none';
                aiLoader.style.display = 'flex';
                const reader = new FileReader();
                reader.onload = (e) => {
                    setTimeout(() => {
                        aiLoader.style.display = 'none';
                        imagePreview.src = e.target.result;
                        previewContainer.style.display = 'block';
                    }, 1000);
                };
                reader.readAsDataURL(file);
            }
        }

        removeImgBtn.addEventListener('click', () => {
            fileInput.value = '';
            selectedFile = null; // Clear the file
            imagePreview.src = '';
            previewContainer.style.display = 'none';
            dropZone.style.display = 'flex';
        });

        // --- 3. Dynamic Sub-Categories ---
        const categoryRadios = document.querySelectorAll('input[name="category"]');
        const subCategorySelect = document.getElementById('subCategory');

        const subCatOptions = {
            top: ['T-Shirt', 'Button Shirt', 'Polo', 'Tank Top', 'Blouse', 'Sweater', 'Hoodie', 'Long Sleeve', 'Henley', 'Crop Top'],
            bottom: ['Jeans', 'Chinos', 'Shorts', 'Skirt', 'Sweatpants', 'Leggings', 'Slacks', 'Cargo Pants', 'Trousers', 'Capris'],
            shoes: ['Sneakers', 'Boots', 'Sandals', 'Loafers', 'Heels', 'Flats', 'Wedges', 'Dress Shoes', 'Running Shoes', 'Slippers'],
            outerwear: ['Jacket', 'Coat', 'Vest', 'Blazer', 'Cardigan', 'Windbreaker', 'Parka', 'Raincoat', 'Trench Coat', 'Poncho']
        };

        function updateSubCategories(selected) {
            const options = subCatOptions[selected];
            subCategorySelect.innerHTML = '';
            options.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt.toLowerCase();
                el.textContent = opt;
                subCategorySelect.appendChild(el);
            });
        }

        updateSubCategories('top');
        categoryRadios.forEach(radio => radio.addEventListener('change', (e) => updateSubCategories(e.target.value)));

        // --- 4. Generate Honeycomb Hex Grid ---
        const honeycombGrid = document.getElementById('honeycombGrid');
        const honeycombPalette = [
            ['#0a2540', '#0d3b66', '#10528c', '#146ab3', '#1783d9', '#429eec'],
            ['#074f4f', '#096b6b', '#0c8787', '#0fa3a3', '#12bfbf', '#3ed1d1', '#6ae3e3'],
            ['#0e590e', '#137a13', '#189b18', '#1dbc1d', '#22dd22', '#4ee44e', '#7aeb7a', '#a6f2a6'],
            ['#335c00', '#4c8a00', '#66b800', '#80e600', '#99ff1a', '#b3ff4d', '#ccff80', '#e6ffb3', '#ffffff'],
            ['#5c5c00', '#8a8a00', '#b8b800', '#e6e600', '#ffff1a', '#ffff4d', '#ffff80', '#ffffb3', '#ffe6f0', '#ffb3d1'],
            ['#5c3d00', '#8a5c00', '#b87a00', '#e69900', '#ffb81a', '#ffc74d', '#ffd680', '#ff99bb', '#ff4d88'],
            ['#5c1f00', '#8a2e00', '#b83d00', '#e64d00', '#ff661a', '#ff854d', '#ff3377', '#cc0044'],
            ['#4a0000', '#6e0000', '#910000', '#b50000', '#d90000', '#ff1a1a', '#ff4d4d'],
            ['#2b0000', '#400000', '#550000', '#6a0000', '#800000', '#950000']
        ];

        let colorChecked = false;
        honeycombPalette.forEach((rowColors) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'honeycomb-row';
            rowColors.forEach((hex) => {
                const label = document.createElement('label');
                label.className = 'honeycomb-cell';
                let isChecked = '';
                if (!colorChecked && hex === '#ffffff') { isChecked = 'checked'; colorChecked = true; }
                label.innerHTML = `
                    <input type="radio" name="color" value="${hex}" ${isChecked}>
                    <div class="honeycomb-hex" style="background:${hex};"></div>
                `;
                rowDiv.appendChild(label);
            });
            honeycombGrid.appendChild(rowDiv);
        });

        // --- 5. Save Logic (MongoDB Integration) ---
        document.getElementById('saveItemBtn').addEventListener('click', async (e) => {
            e.preventDefault();

            // Check if we captured a file
            if (!selectedFile) {
                alert("Please upload an image first!");
                return;
            }

            // Gather all form data safely
            const name = document.getElementById('itemName').value || 'Untitled Item';
            const category = document.querySelector('input[name="category"]:checked')?.value || 'top';
            const subCategory = document.getElementById('subCategory').value;
            const color = document.querySelector('input[name="color"]:checked')?.value || '#ffffff';
            const warmth = document.getElementById('warmthRange').value;

            // Get selected seasons
            const seasonCheckboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            const seasons = Array.from(seasonCheckboxes).map(cb => cb.nextElementSibling.innerText);

            // Change button to loading state
            const btn = document.getElementById('saveItemBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Uploading...';
            btn.disabled = true;

            try {
                // Get user token for authentication
                const token = localStorage.getItem('token');
                if (!token) {
                    alert("You must be logged in to save items.");
                    window.location.href = 'login.html';
                    return;
                }

                // Create FormData for Multer
                const formData = new FormData();
                formData.append('image', selectedFile);
                formData.append('name', name);
                formData.append('category', category);
                formData.append('subCategory', subCategory);
                formData.append('color', color);
                formData.append('warmth', warmth);
                formData.append('seasons', JSON.stringify(seasons));

                // Send POST request to backend
                const response = await fetch('/api/items', {
                    method: 'POST',
                    headers: { 'x-auth-token': token }, // Do NOT set Content-Type with FormData!
                    body: formData
                });

                if (response.ok) {
                    // Success! Redirect to wardrobe
                    window.location.href = "my-wardrobe.html";
                } else {
                    // Smart Error Handling
                    let errorMsg = "Server Error";
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        const errData = await response.json();
                        errorMsg = errData.error || errData.msg || "Unknown Error";
                    } else {
                        console.error("Server crashed:", await response.text());
                        errorMsg = "Backend crash! Check your VS Code terminal for red text.";
                    }

                    alert("Failed to save: \n" + errorMsg);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }

            } catch (error) {
                console.error("Total Fetch Failure:", error);
                alert("Network error: " + error.message + "\n\nIs your Node.js server running in the terminal?");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
