<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix & Match - StyleStash</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --accent-pink: #ec4899;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --sidebar-bg: #0f172a;
            --sidebar-text: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            flex-shrink: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .brand {
            font-family: 'Poppins';
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--sidebar-text);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            font-family: 'Poppins';
            font-size: 0.95rem;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .nav-link.active {
            background-color: var(--accent-blue);
            color: #ffffff;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }

        .nav-link i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .logout-btn {
            color: var(--accent-red);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            height: 100vh;
            position: relative;
        }

        .workspace-area {
            flex: 3;
            background: #e2e8f0;
            display: flex;
            gap: 2rem;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        .mannequin-container {
            flex: 1;
            max-width: 350px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .carousel-row {
            flex: 1;
            background: white;
            border-radius: 16px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .carousel-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s;
        }

        .nav-arrow:hover {
            background: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .arrow-left {
            left: 10px;
        }

        .arrow-right {
            right: 10px;
        }

        .lock-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .lock-toggle.locked {
            background: var(--accent-red);
            color: white;
        }

        /* Lookbook */
        .lookbook-container {
            flex: 1;
            max-width: 450px;
            height: 80vh;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .lookbook-header {
            background: var(--bg-body);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }

        .lookbook-grid {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #f8fafc;
            align-content: start;
        }

        .lookbook-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .lookbook-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-pink);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
        }

        .lookbook-card:hover .delete-btn {
            opacity: 1;
        }

        .lookbook-images {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
            flex-grow: 1;
        }

        .lookbook-images img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 6px;
            background: var(--bg-body);
        }

        .lookbook-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .lookbook-date {
            font-size: 0.75rem;
            color: var(--text-sub);
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: var(--text-sub);
            display: none;
            grid-column: 1 / -1;
            margin-top: 50px;
        }

        /* Control Panel */
        .control-panel {
            flex: 1;
            background: white;
            border-left: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-width: 300px;
            overflow-y: auto;
        }

        .panel-section h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .styled-select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-body);
            font-family: 'Inter';
        }

        .season-toggles {
            display: flex;
            gap: 5px;
            background: var(--bg-body);
            padding: 5px;
            border-radius: 8px;
        }

        .season-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 6px;
        }

        .season-btn.active {
            background: white;
            font-weight: 600;
        }

        .shuffle-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .shuffle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        .shuffle-btn:active {
            transform: scale(0.98);
        }

        .stat-box {
            background: var(--bg-body);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .warmth-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .warmth-bar {
            height: 8px;
            background: #cbd5e1;
            border-radius: 4px;
            overflow: hidden;
        }

        .warmth-fill {
            height: 100%;
            background: #f59e0b;
            width: 0%;
            transition: width 0.5s ease;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--accent-pink);
            background: white;
            color: var(--accent-pink);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .save-btn:hover {
            background: var(--accent-pink);
            color: white;
        }

        .mobile-toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            z-index: 100;
        }

        @media (max-width: 1100px) {
            .workspace-area {
                flex-direction: column;
                height: auto;
                padding-top: 5rem;
            }

            .mannequin-container,
            .lookbook-container {
                width: 100%;
                max-width: 500px;
                height: 60vh;
            }

            .control-panel {
                min-width: auto;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                height: 100%;
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .mobile-toggle-btn {
                display: block;
            }

            .main-content {
                flex-direction: column;
                overflow-y: auto;
            }

            .control-panel {
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }
    </style>
</head>

<body>
    <aside class="sidebar" id="sidebar">
        <div class="brand"><i class="fa-solid fa-layer-group"></i> StyleStash</div>
        <ul class="nav-links">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i>
                    Dashboard</a></li>
            <li class="nav-item"><a href="my-wardrobe.html" class="nav-link"><i class="fa-solid fa-shirt"></i> My
                    Wardrobe</a></li>
            <li class="nav-item"><a href="mix-match.html" class="nav-link active"><i class="fa-solid fa-shuffle"></i>
                    Mix & Match</a></li>
            <li class="nav-item"><a href="laundry-room.html" class="nav-link"><i class="fa-solid fa-jug-detergent"></i>
                    Laundry Room</a></li>
            <li class="nav-item"><a href="calendar.html" class="nav-link"><i class="fa-regular fa-calendar"></i>
                    Calendar</a></li>
            <li class="nav-item"><a href="saved-look.html" class="nav-link"><i class="fa-solid fa-heart"></i> Saved
                    Looks</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="login.html" class="nav-link logout-btn" onclick="logout(event)">
                <div><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</div>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <button class="mobile-toggle-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>

        <div class="workspace-area">
            <div class="mannequin-container">
                <div class="carousel-row" id="topRow">
                    <button class="nav-arrow arrow-left" onclick="prevItem('top')"><i
                            class="fa-solid fa-chevron-left"></i></button>
                    <div class="empty-state" id="emptyTopMsg" style="position: absolute;">Loading...</div>
                    <img src="" class="carousel-img" id="imgTop">
                    <button class="nav-arrow arrow-right" onclick="nextItem('top')"><i
                            class="fa-solid fa-chevron-right"></i></button>
                    <button class="lock-toggle" id="lockTop" onclick="toggleLock('top')"><i
                            class="fa-solid fa-lock-open"></i></button>
                </div>
                <div class="carousel-row" id="bottomRow">
                    <button class="nav-arrow arrow-left" onclick="prevItem('bottom')"><i
                            class="fa-solid fa-chevron-left"></i></button>
                    <div class="empty-state" id="emptyBottomMsg" style="position: absolute;">Loading...</div>
                    <img src="" class="carousel-img" id="imgBottom">
                    <button class="nav-arrow arrow-right" onclick="nextItem('bottom')"><i
                            class="fa-solid fa-chevron-right"></i></button>
                    <button class="lock-toggle" id="lockBottom" onclick="toggleLock('bottom')"><i
                            class="fa-solid fa-lock-open"></i></button>
                </div>
            </div>

            <div class="lookbook-container">
                <div class="lookbook-header"><i class="fa-solid fa-book-open"></i> Style Archive</div>
                <div class="lookbook-grid" id="lookbookGrid">
                    <div class="empty-state" id="emptyLookbookMsg" style="display: block;">
                        <i class="fa-regular fa-folder-open" style="font-size: 2rem; margin-bottom: 10px;"></i><br>
                        Fetching your looks... (Render may take 50s to wake up)
                    </div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="panel-section">
                <h3>Filters</h3>
                <div class="form-group">
                    <label>Occasion</label>
                    <select class="styled-select" id="occasionFilter">
                        <option value="All Occasions">All Occasions</option>
                        <option value="Formal / Work">Formal / Work</option>
                        <option value="Casual">Casual</option>
                        <option value="Party">Party</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Season</label>
                    <div class="season-toggles">
                        <button class="season-btn active">Summer</button>
                        <button class="season-btn">Winter</button>
                        <button class="season-btn">Rain</button>
                    </div>
                </div>
            </div>

            <button class="shuffle-btn" onclick="shuffleOutfit()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> SHUFFLE
            </button>

            <div class="panel-section" style="margin-top: auto;">
                <h3>Outfit Stats</h3>
                <div class="stat-box">
                    <div class="warmth-label"><span>Warmth Level</span><span id="warmthText">0/10</span></div>
                    <div class="warmth-bar">
                        <div class="warmth-fill" id="warmthBar" style="width: 0%;"></div>
                    </div>
                </div>
                <button class="save-btn" onclick="saveLook()">
                    <i class="fa-regular fa-heart"></i> Save Look
                </button>
            </div>
        </div>
    </main>

    <script>
        // ===================================================================
        // 🚨 CRITICAL: REPLACE THIS WITH YOUR ACTUAL RENDER BACKEND URL 🚨
        // Example: 'https://stylestash-api.onrender.com'
        // Make sure there is NO slash at the end of the URL!
        // ===================================================================
        const RAW_BACKEND_URL = 'https://stylestash.onrender.com';
        const BACKEND_URL = RAW_BACKEND_URL.replace(/\/$/, "");

        let allTops = [], allBottoms = [], tops = [], bottoms = [];
        let activeSeason = 'Summer', activeOccasion = 'All Occasions';
        let topIndex = 0, bottomIndex = 0;
        let lockTop = false, lockBottom = false;

        const imgTop = document.getElementById('imgTop');
        const imgBottom = document.getElementById('imgBottom');
        const emptyTopMsg = document.getElementById('emptyTopMsg');
        const emptyBottomMsg = document.getElementById('emptyBottomMsg');
        const emptyLookbookMsg = document.getElementById('emptyLookbookMsg');
        const warmthBar = document.getElementById('warmthBar');
        const warmthText = document.getElementById('warmthText');

        // Bulletproof ID Extractor
        function getCleanId(item) {
            if (!item) return null;
            if (typeof item === 'string') return item;
            if (item.$oid) return item.$oid;
            if (item._id) return typeof item._id === 'string' ? item._id : item._id.$oid;
            return null;
        }

        // Image URL format helper
        function getFullImageUrl(url) {
            if (!url) return null;
            if (url.startsWith('http')) return url;
            return url.startsWith('/') ? `${BACKEND_URL}${url}` : `${BACKEND_URL}/${url}`;
        }

        document.querySelectorAll('.season-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                activeSeason = e.target.innerText.trim();
                applyFilters();
            });
        });

        document.getElementById('occasionFilter').addEventListener('change', (e) => {
            activeOccasion = e.target.value;
            applyFilters();
        });

        function applyFilters() {
            const formalTypes = ['chinos', 'shirt', 'blazer', 'trousers', 'formal pant'];
            const casualTypes = ['jeans', 't-shirt', 'shorts', 'hoodie', 'sweatpants'];
            const partyTypes = ['party-shirt', 'dress', 'leather-jacket'];

            function matchesOccasion(item) {
                if (activeOccasion === 'All Occasions') return true;
                if (!item.subCategory) return false;
                const sub = item.subCategory.toLowerCase();
                if (activeOccasion === 'Formal / Work') return formalTypes.includes(sub);
                if (activeOccasion === 'Casual') return casualTypes.includes(sub);
                if (activeOccasion === 'Party') return partyTypes.includes(sub);
                return false;
            }

            function matchesSeason(item) {
                if (!item.seasons || item.seasons.length === 0) return true;
                const dbSeasons = item.seasons.map(s => s.toLowerCase());
                return dbSeasons.includes(activeSeason.toLowerCase()) || dbSeasons.includes('all year');
            }

            tops = allTops.filter(item => matchesSeason(item) && matchesOccasion(item));
            bottoms = allBottoms.filter(item => matchesSeason(item) && matchesOccasion(item));

            topIndex = 0; bottomIndex = 0;
            initView();
        }

        async function fetchWardrobeFromDB() {
            const token = localStorage.getItem('token');
            if (!token) return window.location.replace('login.html');

            try {
                const itemsRes = await fetch(`${BACKEND_URL}/api/items`, { headers: { 'x-auth-token': token } });
                if (itemsRes.ok) {
                    const allItems = await itemsRes.json();
                    const itemsArray = Array.isArray(allItems) ? allItems : (allItems.data || []);
                    allTops = itemsArray.filter(item => item.category === 'top');
                    allBottoms = itemsArray.filter(item => item.category === 'bottom');
                    applyFilters();
                }

                const outfitsRes = await fetch(`${BACKEND_URL}/api/outfits`, { headers: { 'x-auth-token': token } });
                if (outfitsRes.ok) {
                    const outfits = await outfitsRes.json();
                    renderLookbook(outfits);
                } else {
                    throw new Error("Looks fetch failed");
                }
            } catch (error) {
                console.error("Fetch error:", error);
                emptyLookbookMsg.innerHTML = `<span style="color:var(--danger)">Error connecting to Render Backend. Make sure your server is running at ${BACKEND_URL}</span>`;
            }
        }

        function initView() {
            imgTop.style.display = tops.length === 0 ? 'none' : 'block';
            emptyTopMsg.style.display = tops.length === 0 ? 'block' : 'none';
            emptyTopMsg.innerHTML = tops.length === 0 ? "No Tops Found.<br><a href='add-item.html'>Add one!</a>" : "";

            imgBottom.style.display = bottoms.length === 0 ? 'none' : 'block';
            emptyBottomMsg.style.display = bottoms.length === 0 ? 'block' : 'none';
            emptyBottomMsg.innerHTML = bottoms.length === 0 ? "No Bottoms Found.<br><a href='add-item.html'>Add one!</a>" : "";

            if (tops.length > 0 || bottoms.length > 0) updateView();
            else { warmthText.innerText = `0/10`; warmthBar.style.width = `0%`; }
        }

        function updateView() {
            let tWarmth = 0, bWarmth = 0;
            if (tops.length > 0 && tops[topIndex]) {
                imgTop.src = getFullImageUrl(tops[topIndex].imageUrl);
                tWarmth = parseInt(tops[topIndex].warmth) || 0;
            }
            if (bottoms.length > 0 && bottoms[bottomIndex]) {
                imgBottom.src = getFullImageUrl(bottoms[bottomIndex].imageUrl);
                bWarmth = parseInt(bottoms[bottomIndex].warmth) || 0;
            }
            let divisor = (tops.length > 0 ? 1 : 0) + (bottoms.length > 0 ? 1 : 0);
            if (divisor === 0) return;
            const avg = Math.round((tWarmth + bWarmth) / divisor * 10) / 10;
            warmthText.innerText = `${avg}/10`;
            warmthBar.style.width = `${(avg / 10) * 100}%`;
            warmthBar.style.backgroundColor = (avg / 10) * 100 <= 30 ? '#60a5fa' : ((avg / 10) * 100 >= 70 ? '#ef4444' : '#f59e0b');
        }

        function nextItem(type) {
            if (type === 'top' && !lockTop && tops.length > 0) topIndex = (topIndex + 1) % tops.length;
            if (type === 'bottom' && !lockBottom && bottoms.length > 0) bottomIndex = (bottomIndex + 1) % bottoms.length;
            updateView();
        }

        function prevItem(type) {
            if (type === 'top' && !lockTop && tops.length > 0) topIndex = (topIndex - 1 + tops.length) % tops.length;
            if (type === 'bottom' && !lockBottom && bottoms.length > 0) bottomIndex = (bottomIndex - 1 + bottoms.length) % bottoms.length;
            updateView();
        }

        function toggleLock(type) {
            const btn = document.getElementById(type === 'top' ? 'lockTop' : 'lockBottom');
            if (type === 'top') lockTop = !lockTop; else lockBottom = !lockBottom;
            btn.classList.toggle('locked');
            btn.querySelector('i').className = (type === 'top' ? lockTop : lockBottom) ? 'fa-solid fa-lock' : 'fa-solid fa-lock-open';
        }

        function shuffleOutfit() {
            [imgTop, imgBottom].forEach(el => el.style.opacity = 0);
            setTimeout(() => {
                if (!lockTop && tops.length > 0) topIndex = Math.floor(Math.random() * tops.length);
                if (!lockBottom && bottoms.length > 0) bottomIndex = Math.floor(Math.random() * bottoms.length);
                updateView();
                [imgTop, imgBottom].forEach(el => el.style.opacity = 1);
            }, 300);
        }

        function renderLookbook(outfits) {
            document.querySelectorAll('.lookbook-card').forEach(c => c.remove());
            const arr = Array.isArray(outfits) ? outfits : (outfits.data || []);
            if (arr.length > 0) {
                emptyLookbookMsg.style.display = 'none';
                arr.forEach(o => appendOutfitToDOM(o));
            } else {
                emptyLookbookMsg.innerHTML = "No outfits saved yet.<br>Shuffle and save your first look!";
                emptyLookbookMsg.style.display = 'block';
            }
        }

        async function saveLook() {
            if (tops.length === 0 || bottoms.length === 0) return alert("Please add a top and bottom!");
            const btn = document.querySelector('.save-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

            try {
                const response = await fetch(`${BACKEND_URL}/api/outfits`, {
                    method: 'POST',
                    headers: { 'x-auth-token': localStorage.getItem('token'), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: [getCleanId(tops[topIndex]), getCleanId(bottoms[bottomIndex])], date: new Date() })
                });
                if (!response.ok) throw new Error("Save failed");
                const saved = await response.json();

                emptyLookbookMsg.style.display = 'none';
                appendOutfitToDOM({ _id: getCleanId(saved) || Date.now(), date: new Date(), items: [tops[topIndex], bottoms[bottomIndex]] }, true);

                btn.innerHTML = '<i class="fa-solid fa-check"></i> Added!';
                btn.style.background = 'var(--accent-pink)'; btn.style.color = 'white';
                setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-heart"></i> Save Look'; btn.style.background = 'white'; btn.style.color = 'var(--accent-pink)'; }, 2000);
            } catch (e) {
                alert("Could not save. Is Render backend awake?");
                btn.innerHTML = '<i class="fa-regular fa-heart"></i> Save Look';
            }
        }

        async function deleteLook(id, btn) {
            try {
                await fetch(`${BACKEND_URL}/api/outfits/${id}`, { method: 'DELETE', headers: { 'x-auth-token': localStorage.getItem('token') } });
                btn.closest('.lookbook-card').remove();
                if (document.querySelectorAll('.lookbook-card').length === 0) emptyLookbookMsg.style.display = 'block';
            } catch (e) { alert("Delete failed."); }
        }

        function appendOutfitToDOM(outfit, atTop = false) {
            const grid = document.getElementById('lookbookGrid');
            let d = new Date(outfit.date?.$date || outfit.date);
            const dateStr = isNaN(d) ? "Saved Outfit" : d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });

            const id1 = getCleanId(outfit.items?.[0]), id2 = getCleanId(outfit.items?.[1]);
            const item1 = allTops.find(i => getCleanId(i) === id1) || allBottoms.find(i => getCleanId(i) === id1) || outfit.items?.[0] || {};
            const item2 = allBottoms.find(i => getCleanId(i) === id2) || allTops.find(i => getCleanId(i) === id2) || outfit.items?.[1] || {};

            const tUrl = getFullImageUrl(item1.imageUrl) || 'https://placehold.co/150?text=Top';
            const bUrl = getFullImageUrl(item2.imageUrl) || 'https://placehold.co/150?text=Bottom';

            const card = document.createElement('div');
            card.className = 'lookbook-card';
            card.innerHTML = `<button class="delete-btn" onclick="deleteLook('${getCleanId(outfit)}', this)"><i class="fa-solid fa-trash"></i></button>
                <div class="lookbook-images"><img src="${tUrl}"><img src="${bUrl}"></div>
                <div class="lookbook-title">Saved Outfit</div><div class="lookbook-date">${dateStr}</div>`;

            if (atTop && grid.firstChild) grid.insertBefore(card, emptyLookbookMsg.nextSibling); else grid.appendChild(card);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function logout(e) { e.preventDefault(); localStorage.removeItem('token'); window.location.replace('login.html'); }
        document.addEventListener('DOMContentLoaded', fetchWardrobeFromDB);
    </script>
</body>

</html>
