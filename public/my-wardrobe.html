<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wardrobe - StyleStash</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            /* Gallery Variables */
            --accent: #2563eb;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --bg: #f8fafc;
            --card-radius: 16px;

            /* Sidebar Variables */
            --sidebar-bg: #0f172a;
            --sidebar-text: #94a3b8;
            --sidebar-active: #ffffff;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        /* ================= SIDEBAR STYLES ================= */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            position: fixed;
            height: 100vh;
            transition: transform 0.3s ease;
            z-index: 1000;
            font-family: 'Poppins', sans-serif;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--sidebar-text);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .nav-link.active {
            background-color: var(--accent-blue);
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .nav-link i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1rem;
        }

        .logout-btn {
            color: var(--accent-red) !important;
        }

        .logout-btn:hover {
            background-color: rgba(239, 68, 68, 0.1) !important;
        }

        .mobile-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--text-dark);
            cursor: pointer;
            margin-right: 1rem;
        }

        /* ================= MAIN CONTENT WRAPPER ================= */
        .main-content {
            margin-left: 260px;
            flex: 1;
            width: calc(100% - 260px);
            position: relative;
        }

        /* ================= TOP CONTROL BAR ================= */
        .control-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            padding: 1rem 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
        }

        .search-input {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 999px;
            border: 1px solid #e5e7eb;
            font-size: 0.9rem;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .filter-chips {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
        }

        .chip {
            padding: 0.5rem 1rem;
            border-radius: 999px;
            border: 1px solid #e5e7eb;
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: 0.2s;
        }

        .chip:hover {
            background: #f1f5f9;
        }

        .chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .sort-select {
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            outline: none;
            cursor: pointer;
        }

        .view-toggle {
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-light);
        }

        /* ================= GALLERY ================= */
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            padding: 1.5rem;
        }

        @media (max-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }

        .card {
            position: relative;
            border-radius: var(--card-radius);
            overflow: hidden;
            background: #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 100%; /* Ensures cards stretch equally in rows */
        }

        .card img {
            width: 100%;
            aspect-ratio: 3 / 4; /* Makes every image taller than it is wide perfectly */
            object-fit: cover; /* Crops the image to fit the box without stretching or squishing */
            display: block;
        }
        
        .item-details {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 30px 15px 15px; /* Added a bit more padding so text isn't cut off */
            pointer-events: none;
            transition: 0.3s ease;
        }
        /* ================= BADGES ================= */
        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            display: flex;
            gap: 0.3rem;
            align-items: center;
            text-transform: capitalize;
        }

        .warmth {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* ================= HOVER ACTION BAR ================= */
        .action-bar {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 1rem 0;
            transition: 0.3s ease;
        }

        .card:hover .action-bar {
            bottom: 0;
        }

        .action-bar i {
            cursor: pointer;
            color: var(--text-dark);
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .action-bar i:hover {
            color: var(--accent);
            transform: scale(1.1);
        }

        .action-bar i.fa-trash:hover {
            color: var(--accent-red);
        }

        /* ================= FAB ================= */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 1.8rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
            z-index: 900;
            transition: 0.2s;
        }
        
        .fab:hover {
            transform: scale(1.05);
            background: var(--accent-blue);
        }

        /* ================= EDIT MODAL (NEW) ================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: translateY(20px);
            transition: 0.3s ease;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .modal-header i {
            cursor: pointer;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
        }
        
        .btn-save {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 1rem;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <i class="fa-solid fa-layer-group"></i> StyleStash
        </div>

        <ul class="nav-links">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link">
                    <i class="fa-solid fa-table-columns"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="my-wardrobe.html" class="nav-link active">
                    <i class="fa-solid fa-shirt"></i> My Wardrobe
                </a>
            </li>
            <li class="nav-item">
                <a href="mix-match.html" class="nav-link">
                    <i class="fa-solid fa-shuffle"></i> Mix & Match
                </a>
            </li>
            <li class="nav-item">
                <a href="laundry-room.html" class="nav-link">
                    <i class="fa-solid fa-jug-detergent"></i> Laundry Room
                </a>
            </li>
            <li class="nav-item">
                <a href="calendar.html" class="nav-link">
                    <i class="fa-regular fa-calendar"></i> Calendar
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a href="setting.html" class="nav-link">
                <i class="fa-solid fa-gear"></i> Settings
            </a>
            <a href="login.html" class="nav-link logout-btn" onclick="logout(event)">
                <div><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</div>
            </a>
        </div>
    </aside>

    <main class="main-content">

        <div class="control-bar">
            <div class="mobile-toggle" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </div>

            <input type="text" class="search-input" id="searchInput" placeholder="Search by name or category (e.g., 'Blue Jeans' or 'Tops')...">

            <div class="filter-chips" id="filterContainer">
                <div class="chip active" data-filter="All">All</div>
                <div class="chip" data-filter="top">Tops</div>
                <div class="chip" data-filter="bottom">Bottoms</div>
                <div class="chip" data-filter="shoes">Shoes</div>
                <div class="chip" data-filter="outerwear">Outerwear</div>
                <div class="chip" data-filter="accessories">Accessories</div>
            </div>

            <select class="sort-select" id="sortSelect">
                <option value="newest">Newest First</option>
                <option value="warmth-high">Warmth (High to Low)</option>
                <option value="warmth-low">Warmth (Low to High)</option>
            </select>

            <i class="fa-solid fa-grip view-toggle"></i>
        </div>

        <div class="gallery" id="wardrobeGallery">
            </div>

        <button class="fab" onclick="window.location.href='add-item.html'">+</button>

    </main>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Edit Item</span>
                <i class="fa-solid fa-xmark" onclick="closeEditModal()"></i>
            </div>
            <input type="hidden" id="editItemId">
            
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" id="editItemName" class="form-control" placeholder="e.g., Vintage Denim Jacket">
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="editItemCategory" class="form-control">
                    <option value="top">Top</option>
                    <option value="bottom">Bottom</option>
                    <option value="shoes">Shoes</option>
                    <option value="outerwear">Outerwear</option>
                    <option value="accessories">Accessories</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Warmth Level (1-10)</label>
                <input type="number" id="editItemWarmth" class="form-control" min="1" max="10">
            </div>
            
            <button class="btn-save" onclick="submitEdit()">Save Changes</button>
        </div>
    </div>

    <script>
        // --- Global State for Filtering/Searching ---
        let allWardrobeItems = []; // Stores the raw DB data
        let activeFilter = 'All';
        let searchQuery = '';
        let activeSort = 'newest';

        // --- Sidebar Logic ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        document.addEventListener('click', function (event) {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.querySelector('.mobile-toggle');

            if (sidebar.classList.contains('active') &&
                !sidebar.contains(event.target) &&
                !toggle.contains(event.target)) {
                sidebar.classList.remove('active');
            }
        });

        // --- Event Listeners for New Features ---
        
        // 1. Search Bar Listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            applyFiltersAndRender();
        });

        // 2. Filter Chips Listener
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                // Update UI
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                
                // Update State & Render
                activeFilter = e.target.getAttribute('data-filter');
                applyFiltersAndRender();
            });
        });

        // 3. Sort Select Listener
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            activeSort = e.target.value;
            applyFiltersAndRender();
        });

        // --- Fetch Wardrobe Items from MongoDB ---
        async function fetchWardrobe() {
            const token = localStorage.getItem('token');

            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch('/api/items', {
                    headers: { 'x-auth-token': token }
                });

                if (!response.ok) throw new Error("Failed to fetch items");

                allWardrobeItems = await response.json();
                
                // Run the filter/render loop
                applyFiltersAndRender();

            } catch (err) {
                console.error("Error loading wardrobe:", err);
                document.getElementById('wardrobeGallery').innerHTML = `<p style="text-align: center; grid-column: 1/-1; color: var(--accent-red); padding: 2rem;">Error loading wardrobe. Is your backend server running?</p>`;
            }
        }

        // --- Core Logic: Apply Filters, Search, Sort, then Render ---
        function applyFiltersAndRender() {
            const gallery = document.getElementById('wardrobeGallery');
            
            // Start with all clean items (exclude laundry items)
            let filteredItems = allWardrobeItems.filter(item => item.isClean !== false);

            // Apply Search Query
            if (searchQuery) {
                filteredItems = filteredItems.filter(item => 
                    (item.name && item.name.toLowerCase().includes(searchQuery)) || 
                    (item.category && item.category.toLowerCase().includes(searchQuery))
                );
            }

            // Apply Chip Category Filter
            if (activeFilter !== 'All') {
                filteredItems = filteredItems.filter(item => item.category === activeFilter);
            }

            // Apply Sort
            if (activeSort === 'newest') {
                filteredItems.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            } else if (activeSort === 'warmth-high') {
                filteredItems.sort((a, b) => (b.warmth || 0) - (a.warmth || 0));
            } else if (activeSort === 'warmth-low') {
                filteredItems.sort((a, b) => (a.warmth || 0) - (b.warmth || 0));
            }

            // Render to DOM
            if (filteredItems.length === 0) {
                gallery.innerHTML = `<p style="text-align: center; grid-column: 1/-1; color: var(--text-light); padding: 2rem;">No items found matching your filters.</p>`;
                return;
            }

            gallery.innerHTML = ''; // Clear container

            filteredItems.forEach(item => {
                let warmthIcon = '☀️';
                if (item.warmth <= 3) warmthIcon = '❄️';
                else if (item.warmth >= 8) warmthIcon = '🔥';
                
                const itemName = item.name || "Unnamed Item";

                const cardHTML = `
                    <div class="card" id="item-${item._id}">
                        <div class="badge"><i class="fa-solid fa-tag"></i> ${item.category}</div>
                        <img src="${item.imageUrl}" alt="${itemName}">
                        <div class="warmth" title="Warmth: ${item.warmth || 'N/A'}">${warmthIcon}</div>
                        
                        <div class="item-details">
                            <h4>${itemName}</h4>
                        </div>

                        <div class="action-bar">
                            <i class="fa-solid fa-pen" onclick="openEditModal('${item._id}')" title="Edit Item"></i>
                            <i class="fa-solid fa-basket-shopping" onclick="sendToLaundry('${item._id}')" title="Send to Laundry"></i>
                            <i class="fa-solid fa-trash" onclick="deleteItem('${item._id}')" title="Delete"></i>
                        </div>
                    </div>
                `;
                gallery.insertAdjacentHTML('beforeend', cardHTML);
            });
        }


        // --- NEW: Edit Modal Logic ---
        function openEditModal(id) {
            // Find item in array
            const item = allWardrobeItems.find(i => i._id === id);
            if (!item) return;

            // Populate Modal
            document.getElementById('editItemId').value = item._id;
            document.getElementById('editItemName').value = item.name || '';
            document.getElementById('editItemCategory').value = item.category || 'top';
            document.getElementById('editItemWarmth').value = item.warmth || 5;

            // Show Modal
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function submitEdit() {
            const id = document.getElementById('editItemId').value;
            const updatedName = document.getElementById('editItemName').value;
            const updatedCategory = document.getElementById('editItemCategory').value;
            const updatedWarmth = document.getElementById('editItemWarmth').value;
            const token = localStorage.getItem('token');

            try {
                // Send PUT request to backend
                const response = await fetch(`/api/items/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-auth-token': token
                    },
                    body: JSON.stringify({
                        name: updatedName,
                        category: updatedCategory,
                        warmth: Number(updatedWarmth)
                    })
                });

                if (response.ok) {
                    const updatedItem = await response.json();
                    
                    // Update global array
                    const index = allWardrobeItems.findIndex(i => i._id === id);
                    if(index !== -1) {
                        allWardrobeItems[index] = updatedItem;
                    }

                    closeEditModal();
                    applyFiltersAndRender(); // Re-render the screen
                } else {
                    alert("Failed to update item.");
                }
            } catch (err) {
                console.error(err);
                alert("Network error: Could not save changes.");
            }
        }


        // --- Delete Logic (MongoDB) ---
        async function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                const token = localStorage.getItem('token');

                try {
                    const response = await fetch(`/api/items/${id}`, {
                        method: 'DELETE',
                        headers: { 'x-auth-token': token }
                    });

                    if (response.ok) {
                        // Remove from global array and re-render
                        allWardrobeItems = allWardrobeItems.filter(i => i._id !== id);
                        applyFiltersAndRender();
                    } else {
                        const errData = await response.json();
                        alert("Database Error: " + (errData.msg || errData.error || "Could not delete."));
                    }
                } catch (err) {
                    console.error("Failed to delete item", err);
                    alert("Network error: Could not reach the server to delete.");
                }
            }
        }

        // --- Send Item to Laundry Room ---
        async function sendToLaundry(id) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/items/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-auth-token': token
                    },
                    body: JSON.stringify({ isClean: false })
                });

                if (response.ok) {
                    // Update array to mark dirty, then re-render
                    const index = allWardrobeItems.findIndex(i => i._id === id);
                    if(index !== -1) allWardrobeItems[index].isClean = false;
                    
                    applyFiltersAndRender();
                    alert("Sent to Laundry Room!");
                }
            } catch (err) {
                console.error(err);
                alert("Failed to send to laundry.");
            }
        }

        // --- LOGOUT LOGIC ---
        function logout(event) {
            if (event) {
                event.preventDefault();
            }
            const isConfirmed = confirm("Are you sure you want to log out of StyleStash?");
            if (isConfirmed) {
                localStorage.removeItem('token');
                window.location.replace('login.html');
            }
        }

        // Run fetch when the page loads
        document.addEventListener('DOMContentLoaded', fetchWardrobe);

    </script>
</body>

</html>
