<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Looks - StyleStash</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #0f172a;
            --sidebar-text: #94a3b8;
            --accent-blue: #3b82f6;
            --bg-body: #f1f5f9;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            flex-shrink: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'Poppins';
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--sidebar-text);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            font-family: 'Poppins';
            font-size: 0.95rem;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .nav-link.active {
            background-color: var(--accent-blue);
            color: #ffffff;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .nav-link i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1rem;
        }

        .logout-btn {
            color: var(--danger);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .page-header {
            background: white;
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-header h1 {
            font-size: 1.3rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .page-header i {
            color: var(--accent-blue);
        }

        /* Workspace */
        .archive-workspace {
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .content-width-wrapper {
            width: 100%;
            max-width: 900px;
        }

        .lookbook-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .lookbook-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid var(--border);
            position: relative;
            transition: transform 0.2s;
        }

        .lookbook-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger);
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            opacity: 0;
            transition: 0.2s;
            z-index: 10;
        }

        .lookbook-card:hover .delete-btn {
            opacity: 1;
        }

        .lookbook-images {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }

        .lookbook-images img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            background: var(--bg-body);
        }

        .lookbook-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .lookbook-date {
            font-size: 0.75rem;
            color: var(--text-sub);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-sub);
            border: 2px dashed var(--border);
            border-radius: 12px;
        }

        .mobile-toggle-btn {
            display: none;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                height: 100%;
                transform: translateX(-100%);
                transition: 0.3s;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .mobile-toggle-btn {
                display: block;
                position: absolute;
                top: 15px;
                right: 15px;
                padding: 10px;
                z-index: 50;
            }

            .lookbook-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="brand"><i class="fa-solid fa-layer-group"></i> StyleStash</div>
        <ul class="nav-links">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i>
                    Dashboard</a></li>
            <li class="nav-item"><a href="my-wardrobe.html" class="nav-link"><i class="fa-solid fa-shirt"></i> My
                    Wardrobe</a></li>
            <li class="nav-item"><a href="mix-match.html" class="nav-link"><i class="fa-solid fa-shuffle"></i> Mix &
                    Match</a></li>
            <li class="nav-item"><a href="laundry-room.html" class="nav-link"><i class="fa-solid fa-jug-detergent"></i>
                    Laundry Room</a></li>
            <li class="nav-item"><a href="calendar.html" class="nav-link"><i class="fa-regular fa-calendar"></i>
                    Calendar</a></li>
            <li class="nav-item"><a href="saved-look.html" class="nav-link active"><i
                        class="fa-regular fa-clipboard"></i> Saved-Look</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="#" class="nav-link logout-btn" onclick="logout(event)"><i
                    class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <button class="mobile-toggle-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <header class="page-header"><i class="fa-regular fa-clipboard"></i>
            <h1>Saved Looks</h1>
        </header>

        <div class="archive-workspace">
            <div class="content-width-wrapper">
                <div class="lookbook-grid" id="lookbookGrid">
                    <div id="loadingState" style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <i class="fa-solid fa-spinner fa-spin"
                            style="font-size: 2rem; color: var(--accent-blue); margin-bottom:15px;"></i>
                        <p>Waking up Render server and fetching looks... (this can take 50 seconds!)</p>
                    </div>

                    <div class="empty-state" id="emptyLookbookMsg" style="display: none;">
                        <i class="fa-regular fa-folder-open" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <p>No outfits saved yet.</p>
                        <br>
                        <a href="mix-match.html"
                            style="background: var(--accent-blue); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none;">Go
                            to Mix & Match</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ===================================================================
        // 🚨 CRITICAL: REPLACE THIS WITH YOUR ACTUAL RENDER BACKEND URL 🚨
        // Example: 'https://stylestash-api.onrender.com'
        // Make sure there is NO slash at the end of the URL!
        // ===================================================================
        const RAW_BACKEND_URL = 'https://stylestash.onrender.com';
        const BACKEND_URL = RAW_BACKEND_URL.replace(/\/$/, "");

        let allItems = [];

        function getCleanId(item) {
            if (!item) return null;
            if (typeof item === 'string') return item;
            return item.$oid || item._id || item;
        }

        function getFullImageUrl(url) {
            if (!url) return null;
            if (url.startsWith('http')) return url;
            return url.startsWith('/') ? `${BACKEND_URL}${url}` : `${BACKEND_URL}/${url}`;
        }

        async function fetchData() {
            const token = localStorage.getItem('token');
            const grid = document.getElementById('lookbookGrid');
            const loading = document.getElementById('loadingState');
            const emptyMsg = document.getElementById('emptyLookbookMsg');

            if (!token) return window.location.replace('login.html');

            try {
                // Fetch items first to map IDs to images
                const itemsRes = await fetch(`${BACKEND_URL}/api/items`, { headers: { 'x-auth-token': token } });
                if (itemsRes.ok) {
                    const data = await itemsRes.json();
                    allItems = Array.isArray(data) ? data : (data.data || []);
                }

                // Fetch Outfits
                const response = await fetch(`${BACKEND_URL}/api/outfits`, {
                    headers: { 'x-auth-token': token }
                });

                if (!response.ok) throw new Error("Fetch failed");

                const outfits = await response.json();
                loading.style.display = 'none';

                if (outfits.length === 0) {
                    emptyMsg.style.display = 'block';
                } else {
                    outfits.reverse().forEach(outfit => appendOutfitToDOM(outfit));
                }
            } catch (err) {
                console.error(err);
                loading.innerHTML = `<p style="color: var(--danger);">Unable to connect to your live backend at <b>${BACKEND_URL}</b>. <br><br>Check your Render Dashboard to ensure the server hasn't crashed.</p>`;
            }
        }

        function appendOutfitToDOM(outfit) {
            const grid = document.getElementById('lookbookGrid');

            const id1 = getCleanId(outfit.items?.[0]);
            const id2 = getCleanId(outfit.items?.[1]);

            // Fallback object checking
            const item1 = allItems.find(i => getCleanId(i) === id1) || outfit.items?.[0] || {};
            const item2 = allItems.find(i => getCleanId(i) === id2) || outfit.items?.[1] || {};

            let rawDate = new Date(outfit.date?.$date || outfit.date);
            const dateStr = isNaN(rawDate) ? "Saved Look" : rawDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            const topUrl = getFullImageUrl(item1.imageUrl) || 'https://placehold.co/150x150/f1f5f9/64748b?text=Top';
            const bottomUrl = getFullImageUrl(item2.imageUrl) || 'https://placehold.co/150x150/f1f5f9/64748b?text=Bottom';

            const card = document.createElement('div');
            card.className = 'lookbook-card';
            card.innerHTML = `
                <button class="delete-btn" onclick="deleteLook('${getCleanId(outfit)}', this)"><i class="fa-solid fa-trash"></i></button>
                <div class="lookbook-images">
                    <img src="${topUrl}" alt="Top">
                    <img src="${bottomUrl}" alt="Bottom">
                </div>
                <div class="lookbook-title">Saved Style</div>
                <div class="lookbook-date">${dateStr}</div>
            `;
            grid.appendChild(card);
        }

        async function deleteLook(id, btn) {
            if (!confirm("Remove this look from archive?")) return;
            try {
                const res = await fetch(`${BACKEND_URL}/api/outfits/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-auth-token': localStorage.getItem('token') }
                });
                if (res.ok) {
                    btn.closest('.lookbook-card').remove();
                    if (document.querySelectorAll('.lookbook-card').length === 0) document.getElementById('emptyLookbookMsg').style.display = 'block';
                }
            } catch (err) { alert("Failed to delete."); }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function logout(e) { e.preventDefault(); localStorage.removeItem('token'); window.location.replace('login.html'); }

        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>

</html>
